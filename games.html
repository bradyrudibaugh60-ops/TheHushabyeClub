<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hushabye Games</title>

<link
href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
rel="stylesheet">

<style>

/* ======================================== */
/* RESET */
/* ======================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ======================================== */
/* BODY */
/* ======================================== */

body{

font-family:'Fredoka',sans-serif;

color:white;

overflow-x:hidden;

background:

radial-gradient(
circle at top,
rgba(111,92,255,0.22),
transparent 35%
),

radial-gradient(
circle at bottom,
rgba(77,192,255,0.12),
transparent 30%
),

linear-gradient(
180deg,
#31245c 0%,
#1f2d5a 35%,
#13203f 70%,
#070b1a 100%
);

min-height:100vh;

padding-bottom:60px;

}

/* ======================================== */
/* VHS EFFECT */
/* ======================================== */

body::after{

content:'';

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;

background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.02),
rgba(255,255,255,0.02) 1px,
transparent 1px,
transparent 3px
);

mix-blend-mode:overlay;

animation:vhsFlicker 0.12s infinite;

}

@keyframes vhsFlicker{

0%{
opacity:0.05;
}

50%{
opacity:0.12;
}

100%{
opacity:0.04;
}

}

/* ======================================== */
/* STARS */
/* ======================================== */

.stars{

position:fixed;
inset:0;

overflow:hidden;

z-index:-1;

}

.star{

position:absolute;

width:2px;
height:2px;

background:white;

border-radius:50%;

animation:twinkle 4s infinite;

}

@keyframes twinkle{

0%,100%{
opacity:0.2;
}

50%{
opacity:1;
}

}

/* ======================================== */
/* HEADER */
/* ======================================== */

header{

text-align:center;

padding:70px 20px 40px;

}

h1{

font-size:72px;

color:#f3e8ff;

text-shadow:
0 0 10px rgba(255,255,255,0.4),
0 0 30px rgba(164,130,255,0.4);

}

/* ======================================== */
/* GLITCH */
/* ======================================== */

.glitch{

position:relative;

display:inline-block;

animation:glitchMove 2s infinite;

}

.glitch::before,
.glitch::after{

content:attr(data-text);

position:absolute;

left:0;
top:0;

width:100%;
height:100%;

}

.glitch::before{

left:2px;

text-shadow:-2px 0 red;

opacity:0.5;

clip-path:inset(0 0 45% 0);

}

.glitch::after{

left:-2px;

text-shadow:2px 0 cyan;

opacity:0.5;

clip-path:inset(55% 0 0 0);

}

@keyframes glitchMove{

0%{
transform:translate(0);
}

20%{
transform:translate(-1px,1px);
}

40%{
transform:translate(1px,-1px);
}

60%{
transform:translate(-1px,0px);
}

80%{
transform:translate(1px,1px);
}

100%{
transform:translate(0);
}

}

/* ======================================== */
/* NAV */
/* ======================================== */

nav{

display:flex;

justify-content:center;

gap:18px;

flex-wrap:wrap;

padding:20px;

margin-bottom:30px;

}

nav a{

text-decoration:none;

color:white;

padding:14px 26px;

border-radius:999px;

font-size:18px;

background:
linear-gradient(
135deg,
#8b6dff,
#5dc7ff
);

transition:0.3s;

}

nav a:hover{

transform:
translateY(-3px)
scale(1.05);

}

/* ======================================== */
/* MAIN */
/* ======================================== */

.main{

max-width:1300px;

margin:auto;

padding:20px;

display:grid;

gap:30px;

}

/* ======================================== */
/* CARD */
/* ======================================== */

.card{

background:
linear-gradient(
145deg,
rgba(255,255,255,0.12),
rgba(255,255,255,0.04)
);

border:
1px solid rgba(255,255,255,0.1);

border-radius:30px;

padding:35px;

backdrop-filter:blur(10px);

}

/* ======================================== */
/* GAME GRID */
/* ======================================== */

.game-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(340px,1fr));

gap:25px;

margin-top:25px;

}

/* ======================================== */
/* GAME */
/* ======================================== */

.game{

padding:25px;

border-radius:25px;

background:
rgba(0,0,0,0.25);

border:
1px solid rgba(255,255,255,0.08);

}

/* ======================================== */
/* BUTTON */
/* ======================================== */

.play-btn{

margin-top:20px;

padding:14px 28px;

border:none;

border-radius:999px;

font-size:17px;

cursor:pointer;

color:white;

background:
linear-gradient(
135deg,
#8b6dff,
#5dc7ff
);

}

/* ======================================== */
/* SECRET */
/* ======================================== */

.secret{

margin-top:25px;

padding:20px;

border-radius:20px;

background:
rgba(255,255,255,0.08);

display:none;

text-align:center;

}

/* ======================================== */
/* ERROR POPUP */
/* ======================================== */

.error-popup{

position:fixed;

bottom:20px;
right:20px;

width:320px;

padding:20px;

border-radius:20px;

background:
linear-gradient(
135deg,
#2b123f,
#12081f
);

border:
1px solid rgba(255,255,255,0.1);

box-shadow:
0 0 30px rgba(0,0,0,0.5);

z-index:9999;

display:none;

}

.corrupt-btn{

margin-top:20px;

padding:14px 24px;

border:none;

border-radius:999px;

cursor:pointer;

color:white;

background:
linear-gradient(
135deg,
#4a1f1f,
#1a0000
);

}

/* ======================================== */
/* FISH GAME */
/* ======================================== */

.fishing-area{

margin-top:25px;

width:100%;
height:300px;

position:relative;

overflow:hidden;

border-radius:25px;

background:
linear-gradient(
180deg,
#58b7ff,
#1f4c9b
);

}

.fish{

position:absolute;

width:70px;
height:34px;

background:
linear-gradient(
135deg,
#ffd56f,
#ff9b5e
);

border-radius:
40px 20px 20px 40px;

cursor:pointer;

}

.fish::before{

content:'';

position:absolute;

right:-18px;
top:8px;

border-top:9px solid transparent;
border-bottom:9px solid transparent;
border-left:18px solid #ff9b5e;

}

.fish::after{

content:'';

position:absolute;

left:12px;
top:10px;

width:8px;
height:8px;

background:black;

border-radius:50%;

}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<header>

<h1 class="glitch" data-text="Hushabye Games">
Hushabye Games
</h1>

</header>

<nav>

<a href="index.html">
🏠 Home
</a>

<a href="#">
🎮 Games
</a>

<a href="admin.html">
🔒 TV Admin
</a>

</nav>

<section class="main">

<div class="card">

<h2>
Clubhouse Games
</h2>

<div class="game-grid">

<!-- ======================================== -->
<!-- FISH GAME -->
<!-- ======================================== -->

<div class="game">

<h2>
Pip's Fishing Frenzy
</h2>

<button
class="play-btn"
onclick="startFishing()">

Start Fishing

</button>

<div
class="fishing-area"
id="fishingArea"
style="display:none;">

</div>

<div
class="secret"
id="secretMessage">

STLS

</div>

</div>

<!-- ======================================== -->
<!-- TYPING GAME -->
<!-- ======================================== -->

<div class="game">

<h2>
Lullaby Typer
</h2>

<p style="margin-top:12px;">
Type the lullaby correctly.
</p>

<input
type="text"
id="typingInput"
placeholder="Type here..."
style="
width:100%;
margin-top:15px;
padding:14px;
border:none;
border-radius:14px;
">

<button
class="play-btn"
onclick="checkTypingGame()">

Submit Song

</button>

<div
class="secret"
id="typingSecret">

HE IS LISTENING

</div>

</div>

<!-- ======================================== -->
<!-- STAR GAME -->
<!-- ======================================== -->

<div class="game">

<h2>
Night Sky Clicker
</h2>

<button
class="play-btn"
onclick="startStarGame()">

Start Star Hunt

</button>

<div
id="starGameArea"
style="
margin-top:25px;
height:300px;
border-radius:25px;
position:relative;
overflow:hidden;
background:
linear-gradient(
180deg,
#0f1835,
#050816
);
display:none;
">

</div>

<div
class="secret"
id="starSecret">

CHANNEL 13 REMEMBERS

</div>

</div>

</div>

</div>

</section>

<!-- ======================================== -->
<!-- ERROR POPUP -->
<!-- ======================================== -->

<div
class="error-popup"
id="errorPopup">

<h3
class="glitch"
data-text="SIGNAL ERROR">

SIGNAL ERROR

</h3>

<p style="margin-top:12px;">
Broadcast instability detected.
</p>

<button
class="corrupt-btn"
onclick="closeError()">

Silence Signal

</button>

</div>

<script>

/* ======================================== */
/* STARS */
/* ======================================== */

const starsContainer =
document.getElementById(
'stars'
);

for(let i=0;i<160;i++){

const star =
document.createElement('div');

star.classList.add(
'star'
);

star.style.left =
Math.random()*100+'vw';

star.style.top =
Math.random()*100+'vh';

star.style.opacity =
Math.random();

starsContainer.appendChild(
star
);

}

/* ======================================== */
/* FISHING */
/* ======================================== */

let score = 0;

function startFishing(){

const area =
document.getElementById(
'fishingArea'
);

area.innerHTML = '';

area.style.display =
'block';

for(let i=0;i<12;i++){

spawnFish();

}

}

function spawnFish(){

const fish =
document.createElement('div');

fish.classList.add(
'fish'
);

const area =
document.getElementById(
'fishingArea'
);

fish.style.left =
Math.random()*85+'%';

fish.style.top =
Math.random()*80+'%';

fish.onclick = function(){

fish.remove();

score++;

if(score >= 10){

document.getElementById(
'secretMessage'
).style.display =
'block';

}

spawnFish();

};

area.appendChild(fish);

}

/* ======================================== */
/* TYPING GAME */
/* ======================================== */

function checkTypingGame(){

const input =
document.getElementById(
'typingInput'
).value
.trim()
.toLowerCase();

if(
input ===
'twinkle little sleepy star'
){

document.getElementById(
'typingSecret'
).style.display =
'block';

}

}

/* ======================================== */
/* STAR GAME */
/* ======================================== */

let starPoints = 0;

function startStarGame(){

const area =
document.getElementById(
'starGameArea'
);

area.innerHTML = '';

area.style.display =
'block';

spawnClickStar();

}

function spawnClickStar(){

const area =
document.getElementById(
'starGameArea'
);

const star =
document.createElement('div');

star.style.position =
'absolute';

star.style.width =
'28px';

star.style.height =
'28px';

star.style.background =
'#fff0a8';

star.style.clipPath =
'polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)';

star.style.cursor =
'pointer';

star.style.left =
Math.random()*90+'%';

star.style.top =
Math.random()*85+'%';

star.onclick = function(){

star.remove();

starPoints++;

if(starPoints >= 15){

document.getElementById(
'starSecret'
).style.display =
'block';

return;

}

spawnClickStar();

};

area.appendChild(star);

}

/* ======================================== */
/* SIGNAL ERROR */
/* ======================================== */

setTimeout(()=>{

document.getElementById(
'errorPopup'
).style.display =
'block';

},25000);

function closeError(){

document.getElementById(
'errorPopup'
).style.display =
'none';

}

/* ======================================== */
/* RANDOM GLITCHES */
/* ======================================== */

setInterval(()=>{

const titles =
document.querySelectorAll('h2');

const randomTitle =
titles[
Math.floor(
Math.random()*titles.length
)
];

const original =
randomTitle.innerText;

randomTitle.innerText =
'██ SIGNAL LOST ██';

setTimeout(()=>{

randomTitle.innerText =
original;

},700);

},18000);

/* ======================================== */
/* SECRET CONSOLE */
/* ======================================== */

console.log(
'%cMR. LULL IS WATCHING.',
'color:red;font-size:28px;font-weight:bold;'
);

</script>

</body>
</html>
